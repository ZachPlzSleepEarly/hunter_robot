controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_like_controller:
      type: ackermann_steering_controller/AckermannSteeringController

joint_state_broadcaster:
  ros__parameters: {}

ackermann_like_controller:
  ros__parameters:
    # Joints
    # 官方要求两转向、两驱动；双 joint 时顺序期望是 right, left
    steering_joints_names:
      - front_right_steering_joint
      - front_left_steering_joint

    traction_joints_names:
      - rear_right_wheel_joint
      - rear_left_wheel_joint

    # Geometry
    wheelbase: 0.65142
    traction_track_width: 0.585
    steering_track_width: 0.585
    traction_wheels_radius: 0.165

    # Odometry
    odom_frame_id: odom
    base_frame_id: base_link
    publish_rate: 50.0
    open_loop: false
    position_feedback: false
    enable_odom_tf: false
    pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    velocity_rolling_window_size: 10

    # Safety / behavior
    reduce_wheel_speed_until_steering_reached: false
    reference_timeout: 0.5